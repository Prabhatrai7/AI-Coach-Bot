<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ask a Question</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/framer-motion@10.12.16/dist/framer-motion.js"></script>
</head>

<body class="h-screen w-screen bg-gradient-to-br from-emerald-50 via-white to-slate-100 overflow-hidden">

    <!-- FULL SCREEN WRAPPER -->
    <div class="h-full w-full flex items-center justify-center px-6">

        <!-- CARD -->
        <div id="container"
             class="relative max-w-lg w-full
                    bg-white/90 backdrop-blur-xl
                    rounded-3xl shadow-2xl
                    border border-slate-200
                    p-8 lg:p-10">

            <!-- Glow -->
            <div class="absolute -inset-6 bg-emerald-400/20 blur-3xl rounded-3xl -z-10"></div>

            <!-- Header -->
            <div class="text-center mb-8">
                <h1
                    class="text-4xl font-extrabold
                           text-transparent bg-clip-text
                           bg-gradient-to-r from-emerald-600 to-teal-600">
                    Ask a Question
                </h1>
                <p class="mt-2 text-slate-600">
                    Get instant answers from your resume insights
                </p>
            </div>

            <!-- FORM -->
            <form action="/ask" method="POST" class="space-y-6">

                <div class="relative">
                    <input
                        type="text"
                        name="query"
                        required
                        placeholder="Type your question here..."
                        class="w-full px-5 py-4 rounded-xl
                               border border-slate-300
                               text-slate-800 text-sm
                               focus:outline-none focus:ring-2
                               focus:ring-emerald-500 transition"
                    >
                    <span class="absolute inset-y-0 right-4 flex items-center text-slate-400">
                        💬
                    </span>
                </div>

                <button
                    type="submit"
                    class="w-full py-3 rounded-xl
                           bg-gradient-to-r from-emerald-600 to-teal-600
                           text-white font-semibold
                           shadow-lg hover:scale-105 transition-transform">
                    🚀 Submit Question
                </button>

            </form>

        </div>

    </div>

    <!-- Animations -->
    <script>
        const { motion } = window.Motion;

        motion(document.getElementById("container"), {
            initial: { opacity: 0, y: 40 },
            animate: { opacity: 1, y: 0 },
            transition: { duration: 0.6, ease: "easeOut" }
        });
    </script>

</body>
</html>
