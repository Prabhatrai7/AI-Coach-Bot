<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Analysis Results</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/framer-motion@10.12.16/dist/framer-motion.js"></script>
</head>

<body class="h-screen w-screen bg-gradient-to-br from-emerald-50 via-white to-slate-100 overflow-hidden">

    <!-- FULL SCREEN WRAPPER -->
    <div class="h-full w-full flex items-center justify-center px-6">

        <!-- Main Card -->
        <div id="container"
             class="relative h-[90vh] max-w-6xl w-full
                    bg-white/90 backdrop-blur-xl
                    rounded-3xl shadow-2xl
                    border border-slate-200
                    flex flex-col p-8 lg:p-12">

            <!-- Glow -->
            <div class="absolute -inset-6 bg-emerald-400/20 blur-3xl rounded-3xl -z-10"></div>

            <!-- Header -->
            <div class="text-center mb-6">
                <h1
                    class="text-4xl lg:text-5xl font-extrabold
                           text-transparent bg-clip-text
                           bg-gradient-to-r from-emerald-600 to-teal-600">
                    Resume Analysis Report
                </h1>
                <p class="mt-2 text-slate-600 text-lg">
                    AI-powered insights to guide your career growth
                </p>
            </div>

            <!-- RESULT (SCROLLS, PAGE DOES NOT) -->
            <div id="result"
                 class="flex-1 bg-slate-50 rounded-2xl
                        p-6 lg:p-8
                        border border-slate-200
                        shadow-inner
                        overflow-y-auto">

                <pre class="whitespace-pre-wrap text-slate-700 text-sm leading-relaxed font-mono">
{{ resume_analysis }}
                </pre>
            </div>

            <!-- ACTIONS -->
            <div class="mt-6 flex flex-col sm:flex-row gap-4 justify-between items-center">

                <a href="/"
                   class="px-6 py-3 rounded-lg
                          bg-slate-700 text-white font-semibold
                          shadow-md hover:bg-slate-800
                          transition transform hover:-translate-y-1">
                    ← Upload Another Resume
                </a>

                <a href="/ask"
                   class="px-6 py-3 rounded-lg
                          bg-gradient-to-r from-emerald-600 to-teal-600
                          text-white font-semibold
                          shadow-lg hover:scale-105 transition-transform">
                    💬 Ask Questions About Resume
                </a>
            </div>

        </div>

    </div>

    <!-- Animations -->
    <script>
        const { motion } = window.Motion;

        motion(document.getElementById("container"), {
            initial: { opacity: 0, y: 40 },
            animate: { opacity: 1, y: 0 },
            transition: { duration: 0.6, ease: "easeOut" }
        });

        motion(document.getElementById("result"), {
            initial: { opacity: 0, scale: 0.96 },
            animate: { opacity: 1, scale: 1 },
            transition: { delay: 0.2, duration: 0.5 }
        });
    </script>

</body>
</html>
